name: CI Pipeline — Stock Realtime

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance google-cloud-pubsub google-cloud-bigquery pandas python-dotenv pyarrow pytest

      - name: Run tests
        run: |
          pytest tests/ -v

      - name: Check code structure
        run: |
          echo "✅ Publisher exists" && test -f publisher/publisher.py
          echo "✅ Subscriber exists" && test -f subscriber/subscriber.py
          echo "✅ Tests exist" && test -f tests/test_publisher.py