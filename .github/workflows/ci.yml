name: CI Pipeline — Stock Realtime

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance google-cloud-pubsub google-cloud-bigquery pandas python-dotenv pyarrow pytest

      - name: Run tests
        run: |
          pytest tests/ -v

      - name: Check code structure
        run: |
          test -f publisher/publisher.py && echo "✅ Publisher exists"
          test -f subscriber/subscriber.py && echo "✅ Subscriber exists"
          test -f tests/test_publisher.py && echo "✅ Tests exist"